<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>

    <style>
        .Link {
        color: rgb( 0, 133, 133);
        }

        .stock {
            color: rgb(0, 188, 0);
            font-weight: bold;
        }

        .Add {
            background-color: rgb(255, 216, 20);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;   
        }

        .Buy {
            background-color: rgb(255, 164, 28);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <a href="" class="Link">Back to Amazon</a>
    <h1>Nike Black Running Shoes</h1>
    <p class="stock">$39 - in stock.</p>
    <p>Free delivery tomorrow.</p>
    <button class="Add">Add to Cart</button>
    <button class="Buy"> Buy Now</button>
</body>
</html>
