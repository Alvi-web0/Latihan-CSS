<html>
    <head>
        <title>Opacity</title>
        <style>
            .Uber {
                background: black;
                color: white;
                padding: 12px 20px;
                border: none;
                cursor: pointer;
                transition: opacity 0.3s;
            }

            .Uber:hover {
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <button class="Uber">Request now</button>
    </body>
</html>
