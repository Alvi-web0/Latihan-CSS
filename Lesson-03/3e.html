<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkedln</title>
    <style>
        .Apply {
            background: #0a66c2;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .Apply:hover {
            background: #004182;
        }

        .save {
            background: white;
            color: #0a66c2;
            padding: 10px 20px;
            border: 2px solid #0a66c2;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .save:hover {
            background: #e6f0fa;
        }
    </style>
</head>
<body>
    <button class="Apply">Apply on company website</button>
    <button class="save">Save</button>
</body>
</html>
