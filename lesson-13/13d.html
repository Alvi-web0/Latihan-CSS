<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gmail UI</title>
  <link rel="stylesheet" href="style13d.css">
</head>
<body>

<div class="card">
  <div class="header">ALL INBOXES</div>

  <div class="email">
    <img src="https://via.placeholder.com/40" class="avatar">

    <div class="content">
      <div class="top">
        <div class="sender">Chewy Promotions</div>
        <div class="time">4:58 PM</div>
      </div>

      <div class="subject">Biggest sales of the year!</div>
      <div class="message">Hey there! We're writing to tell you about our...</div>
    </div>
  </div>

</div>

</body>
</html>
