<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style13e.css">
</head>
<body>
    <div class="card">
    <div class="header">ALL INBOXES</div>

        <div class="email">
            <img src="https://i.pinimg.com/originals/2c/7f/f6/2c7ff6e51b9c31f06af1e3a78667f551.jpg" class="avatar">
                <div class="content">
                    <div class="top">
                    <div class="sender">Chewy Promotions</div>
                    <div class="time">4:58 PM</div>
                </div>
                    <div class="subject">Biggest sales of the year!</div>
                    <div class="message">Hey there! We're writing...</div>
                </div>
        </div>

        <div class="email">
            <img src="https://i.pinimg.com/originals/2c/7f/f6/2c7ff6e51b9c31f06af1e3a78667f551.jpg" class="avatar">
                <div class="content">
                    <div class="top">
                    <div class="sender">Best Buy</div>
                    <div class="time">12:32 PM</div>
                </div>
                    <div class="subject">Your Best Buy eReceipt</div>
                    <div class="message">Thank you for shopping...</div>
                </div>
        </div>

        <div class="email">
            <img src="https://i.pinimg.com/originals/2c/7f/f6/2c7ff6e51b9c31f06af1e3a78667f551.jpg" class="avatar">
                <div class="content">
                    <div class="top">
                    <div class="sender">Netflix</div>
                    <div class="time">9:00 AM</div>
                </div>
                    <div class="subject">Here's what's coming soon</div>
                    <div class="message">Brand new movies...</div>
                </div>
        </div>

    </div>
</body>
</html>
