<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kucing</title>
    <style>
        .card {
            width: 400px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        img {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            object-fit: cover;
            margin-right: 12px;
        }

        .info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .nama {
            font-weight: bold;
            margin: 0;
            font-size: 18px;
        }

        .stats, .status {
            margin: 0;
            color: gray;
            font-size: 14px;
        }

        button {
            background-color: #1d9bf0;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="3.jpg" alt="oliver">
        <div class="info">
            <p class="nama">Oliver</p>
            <p class="stats">The cat</p>
            <p class="status">Populer</p>
        </div>
        <button>Follow</button>
    </div>
</body>
</html>
