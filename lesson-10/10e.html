<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>build</title>
    <style>
        .profile-card {
            display: inline-block; 
            width: 200px;
            vertical-align: top;
            margin-right: 15px;
            background-color: white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            font-family: Arial, sans-serif;
        }

        .profile-pic {
            width: 100%;
            height: 200px;
            object-fit: cover; 
        }

        .card-content {
            padding: 10px;
        }

        .name {
            font-weight: bold;
            font-size: 18px;
            margin: 0 0 5px 0;
        }

        .mutual-info {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .mini-icon {
            width: 28px;
            height: 28px;
            border-radius: 14px;
            margin-right: 8px;
        }

        .mutual-text {
            color: gray;
            font-size: 14px;
        }

        .add-btn {
            background-color: #4c8bf5;
            color: white;
            border: none;
            padding: 8px 0;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <img class="profile-pic" src="1.jpg">

        <div class="card-content">
            <p class="name">Oliver</p>
            
            <div class="mutual-info">
                <img class="mini-icon" src="What.png">
                <span class="mutual-text">2 mutual friends</span>
            </div>

            <button class="add-btn">Add Friend</button>
        </div>
    </div>

    <div class="profile-card">
        <img class="profile-pic" src="1.jpg">

        <div class="card-content">

            <div class="mutual-info">
                <img class="mini-icon" src="What.png">
                <span class="mutual-text">2 mutual friends</span>
            </div>

            <button class="add-btn">Add Friend</button>
        </div>
    </div>

        <img class="profile-pic" src="1.jpg">

        <div class="card-content">
            <p class="name">Oliver</p>
            
            <div class="mutual-info">
                <img class="mini-icon" src="What.png">
                <span class="mutual-text">2 mutual friends</span>
            </div>

            <button class="add-btn">Add Friend</button>
        </div>
    </div>
</body>
</html>
