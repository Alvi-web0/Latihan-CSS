<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTL</title>
    <style>
        .pc {
            display: inline-block;
            width: 200px;
            vertical-align: top;
            margin-right: 15px;
            background-color: white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            font-family: Arial, sans-serif;
        }

        .pp {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .layout {
            padding: 10px;
        }

        .nama {
            font-weight: bold;
            font-size: 18px;
            margin: 0 0 5px 0;
        }

        .mt {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .icon {
            width: 28px;
            height: 28px;
            border-radius: 14px;
            margin-right: 8px;
        }

        .text {
            color: gray;
            font-size: 14px;
        }

        button {
            background-color: #4c8bf5;
            color: white;
            border: none;
            padding: 8px 0;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="pc">
        <img src="1.jpg" class="pp">
        <div class="layout">
            <p class="nama">Oliver</p>
            <div class="mt">
                <img src="Which.png" class="icon">
                <span class="text">2 mutual friends</span>
            </div>
            <button>Add Friend</button>
        </div>
    </div>

    <div class="pc">
        <img src="3.jpg" class="pp">
        <div class="layout">
            <p class="nama">Oliver</p>
            <div class="mt">
                <img src="Which.png" class="icon">
                <span class="text">3 mutual friends</span>
            </div>
            <button>Add Friend</button>
        </div>
    </div>

    <div class="pc">
        <img src="1.jpg" class="pp">
        <div class="layout">
            <p class="nama">Oliver</p>
            <div class="mt">
                <img src="Which.png" class="icon">
                <span class="text">4 mutual friends</span>
            </div>
            <button>Add Friend</button>
        </div>
    </div>
</body>
</html>
