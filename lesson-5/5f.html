<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS</title>
    <style>
       .main-price {
        font-size: 28px;
       }
       .currency {
        color: gray;
        font-size: 14px;
       }

       .green {
        color: green;
       }

       .red {
        color: red;
       }

       .gray {
        color: gray;
       }
    </style>
</head>
<body>
    <span class="main-price">1,049.61</span>
    <span class="currency">USD</span>

    <p class="green">+18.05 (1.75%) today</p>

    <p class="gray">
        After hours 1,04.00
        <span class="red">-1.61 (0.15%)</span>
    </p>
</body>
</html>
